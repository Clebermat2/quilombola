<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Memória - Curso de Gestão de Recursos do PDDE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            text-transform: uppercase;
        }
        .game-board {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
            perspective: 1000px;
        }
        .card {
            width: 100%;
            aspect-ratio: 3 / 4;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            cursor: pointer;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .card.is-flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0.75rem;
            overflow: hidden;
            transition: border-color 0.5s;
        }
        .card-front {
            background-color: #ffffff;
            color: #000000;
            font-size: 0.75rem;
            font-weight: bold;
            line-height: 1.3;
            transform: rotateY(180deg);
            border: 2px solid #3b82f6;
            flex-direction: column;
            justify-content: space-between;
        }
        .card-front-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .card-footer {
            font-size: 0.65rem;
            color: #2d3748;
            width: 100%;
            text-align: center;
            padding-top: 0.5rem;
            border-top: 1px solid #e5e7eb;
            margin-top: 0.5rem;
        }
        .card-back {
            background-color: #ffffff;
            background-image: url('http://googleusercontent.com/file_content/0');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            border: 2px solid #a5b4fc;
        }
        .card.is-matched {
            pointer-events: none;
        }
        .card.is-matched .card-face {
            border-color: #22c55e;
        }
        #win-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease-in-out;
        }
        #win-modal.show {
            opacity: 1;
            pointer-events: auto;
        }
        #win-message {
            transform: scale(0.9);
            transition: transform 0.3s ease-in-out;
        }
        #win-modal.show #win-message {
             transform: scale(1);
        }
    </style>
</head>
<body class="bg-slate-100 flex flex-col items-center justify-center min-h-screen p-4">


    <div class="w-full max-w-4xl mx-auto">
       
        <!-- --- CABEÇALHO COM NOVO DESIGN --- -->
        <div class="bg-gradient-to-r from-blue-700 to-blue-900 text-white p-6 rounded-xl shadow-lg mb-6">
            <header class="text-center">
                <h1 class="text-3xl md:text-4xl font-bold tracking-wider">JOGO DA MEMÓRIA</h1>
                <h2 class="text-xl md:text-2xl opacity-90 mt-1">CURSO DE GESTÃO DE RECURSOS DO PDDE</h2>
            </header>
            <div class="text-center mt-4 text-lg bg-black bg-opacity-25 p-3 rounded-lg">
                <span class="font-semibold">PARES ENCONTRADOS:</span>
                <span id="score" class="font-bold text-2xl ml-2">0</span> / <span id="total-pairs" class="text-2xl"></span>
            </div>
        </div>


        <main id="game-board" class="game-board">
            <!-- As cartas serão geradas pelo JavaScript -->
        </main>
    </div>


    <!-- Modal de Vitória -->
    <div id="win-modal" class="hidden">
        <div id="win-message" class="text-center bg-white p-8 rounded-lg shadow-2xl max-w-sm mx-auto">
             <h2 class="text-3xl font-bold text-green-600">PARABÉNS!</h2>
             <p class="mt-4 text-lg text-gray-800">VOCÊ COMPLETOU O DESAFIO COM SUCESSO!</p>
             <button id="play-again-button" class="mt-6 bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-6 rounded-lg transition-colors">JOGAR NOVAMENTE</button>
        </div>
    </div>


    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DADOS DAS CARTAS COM ÍCONES PERSONALIZADOS ---
            const cardData = [
                { id: 1, type: 'concept', text: 'Prestação de Contas', icon: '<svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mb-2 text-blue-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>' },
                { id: 1, type: 'definition', text: 'Obrigação legal de comprovar a aplicação correta dos recursos do PDDE, incluindo itens de infraestrutura, merenda e materiais pedagógicos que respeitem a tradição e cultura quilombola.', icon: '<svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mb-2 text-blue-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>' },
                { id: 2, type: 'concept', text: 'GRU – Guia de Recolhimento da União', icon: '<svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mb-2 text-red-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><polyline points="12 18 8 14 12 10"></polyline><line x1="8" y1="14" x2="16" y2="14"></line></svg>' },
                { id: 2, type: 'definition', text: 'Documento utilizado para devolução de saldos ou recursos impugnados ao FNDE, garantindo gestão transparente.', icon: '<svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mb-2 text-red-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><polyline points="12 18 8 14 12 10"></polyline><line x1="8" y1="14" x2="16" y2="14"></line></svg>' },
                { id: 3, type: 'concept', text: 'Prazo de envio da prestação de contas', icon: '<svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mb-2 text-amber-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>' },
                { id: 3, type: 'definition', text: 'Até 30 de abril do ano subsequente ao recebimento dos recursos, conforme normas do FNDE.', icon: '<svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mb-2 text-amber-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>' },
                { id: 4, type: 'concept', text: 'Rol de Materiais Prioritários', icon: '<svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mb-2 text-green-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>' },
                { id: 4, type: 'definition', text: 'Lista obrigatória que orienta compras de materiais pedagógicos e itens de infraestrutura, incluindo aqueles que valorizam a história e cultura quilombola.', icon: '<svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mb-2 text-green-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>' },
                { id: 5, type: 'concept', text: 'Comprovante da GRU', icon: '<svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mb-2 text-purple-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>' },
                { id: 5, type: 'definition', text: 'Deve ser anexado à pasta de prestação de contas, com código identificador visível, garantindo rastreabilidade e conformidade legal.', icon: '<svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mb-2 text-purple-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>' },
            ];


            // --- ELEMENTOS DO DOM ---
            const gameBoard = document.getElementById('game-board');
            const scoreElement = document.getElementById('score');
            const totalPairsElement = document.getElementById('total-pairs');
            const winModal = document.getElementById('win-modal');
            const playAgainButton = document.getElementById('play-again-button');


            // --- ESTADO DO JOGO ---
            let flippedCards = [];
            let matchedPairs = 0;
            let lockBoard = false;
            let totalPairs = cardData.length / 2;


            // --- FUNÇÕES DO JOGO ---


            function shuffle(array) {
                array.sort(() => Math.random() - 0.5);
            }


            function createGameBoard() {
                gameBoard.innerHTML = '';
                winModal.classList.remove('show');
                winModal.classList.add('hidden');
                matchedPairs = 0;
                totalPairs = cardData.length / 2;
                scoreElement.textContent = matchedPairs;
                totalPairsElement.textContent = totalPairs;
                lockBoard = false;


                const shuffledCards = [...cardData];
                shuffle(shuffledCards);


                shuffledCards.forEach(data => {
                    const cardElement = document.createElement('div');
                    cardElement.classList.add('card');
                    cardElement.dataset.pairId = data.id;


                    cardElement.innerHTML = `
                        <div class="card-face card-back"></div>
                        <div class="card-face card-front">
                            <div class="card-front-content">
                                ${data.icon}
                                <p>${data.text}</p>
                            </div>
                            <div class="card-footer">
                                GESTÃO DE RECURSOS DO PDDE
                            </div>
                        </div>
                    `;
                   
                    cardElement.addEventListener('click', () => flipCard(cardElement));
                    gameBoard.appendChild(cardElement);
                });
            }


            function flipCard(card) {
                if (lockBoard || card.classList.contains('is-matched') || card === flippedCards[0]) return;
                card.classList.add('is-flipped');
                if (flippedCards.length === 0) {
                    flippedCards.push(card);
                } else {
                    flippedCards.push(card);
                    lockBoard = true;
                    checkForMatch();
                }
            }


            function checkForMatch() {
                const [cardOne, cardTwo] = flippedCards;
                const isMatch = cardOne.dataset.pairId === cardTwo.dataset.pairId;
                isMatch ? disableMatchedCards() : unflipCards();
            }


            function celebrate() {
                winModal.classList.remove('hidden');
                setTimeout(() => winModal.classList.add('show'), 10);


                // --- ALTERAÇÃO PARA JOGO ÚNICO ---
                playAgainButton.textContent = 'FIM DE JOGO';
                playAgainButton.disabled = true;
                playAgainButton.classList.remove('bg-green-500', 'hover:bg-green-600');
                playAgainButton.classList.add('bg-gray-500', 'cursor-not-allowed');


                const duration = 3 * 1000;
                const animationEnd = Date.now() + duration;
                const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 1000 };


                function randomInRange(min, max) { return Math.random() * (max - min) + min; }


                const interval = setInterval(function() {
                    const timeLeft = animationEnd - Date.now();
                    if (timeLeft <= 0) { return clearInterval(interval); }
                    const particleCount = 50 * (timeLeft / duration);
                    confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
                    confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
                }, 250);
            }


            function disableMatchedCards() {
                flippedCards.forEach(card => card.classList.add('is-matched'));
                matchedPairs++;
                scoreElement.textContent = matchedPairs;
                if (matchedPairs === totalPairs) {
                    setTimeout(celebrate, 800);
                }
                resetBoardState();
            }


            function unflipCards() {
                setTimeout(() => {
                    flippedCards.forEach(card => card.classList.remove('is-flipped'));
                    resetBoardState();
                }, 1200);
            }


            function resetBoardState() {
                flippedCards = [];
                lockBoard = false;
            }


            // --- INICIALIZAÇÃO ---
            createGameBoard();
        });
    </script>
</body>
</html>
